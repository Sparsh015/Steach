{% extends "home/base.html" %}
{% load static %}

{% block body %}
<div class="page-wrapper">
   <div class="content container-fluid">

      <div class="page-header">
         <div class="row align-items-center">
            <div class="col">
               <h3 class="page-title">Delete Teacher</h3>
               <ul class="breadcrumb">
                  <li class="breadcrumb-item"><a href="{% url 'teacher_list' %}">Teachers</a></li>
                  <li class="breadcrumb-item active">Delete Teacher</li>
               </ul>
            </div>
         </div>
      </div>

      <div class="row">
         <div class="col-sm-12">
            <div class="card">
               <div class="card-body">
                  <div class="alert alert-danger">
                     <h4>Are you sure you want to delete this teacher?</h4>
                     <p><strong>Name:</strong> {{ teacher.first_name }} {{ teacher.last_name }}</p>
                     <p><strong>Teacher ID:</strong> {{ teacher.teacher_id }}</p>
                  </div>

                  <form method="POST">
                     {% csrf_token %}
                     <button type="submit" class="btn btn-danger">Yes, Delete</button>
                     <a href="{% url 'teacher_list' %}" class="btn btn-secondary">Cancel</a>
                  </form>
               </div>
            </div>
         </div>
      </div>

   </div>
</div>
{% endblock %}
