{% extends "home/base.html" %}
{% load static %}

{% block body %}
<div class="page-wrapper">
   <div class="content container-fluid">

      <div class="page-header">
         <div class="row align-items-center">
            <div class="col">
               <h3 class="page-title">Edit Teacher</h3>
               <ul class="breadcrumb">
                  <li class="breadcrumb-item"><a href="{% url 'teacher_list' %}">Teachers</a></li>
                  <li class="breadcrumb-item active">Edit Teacher</li>
               </ul>
            </div>
         </div>
      </div>

      <div class="row">
         <div class="col-sm-12">
            <div class="card">
               <div class="card-body">

                  <form method="POST" enctype="multipart/form-data">
                     {% csrf_token %}
                     {% if messages %}
                        {% for message in messages %}
                           <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                              {{ message }}
                              <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                 <span aria-hidden="true">&times;</span>
                              </button>
                           </div>
                        {% endfor %}
                     {% endif %}
                     <div class="row">

                        <!-- TEACHER INFORMATION -->
                        <div class="col-12">
                           <h5 class="form-title"><span>Teacher Information</span></h5>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>First Name</label>
                              <input type="text" name="first_name" class="form-control" value="{{ teacher.first_name }}">
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Last Name</label>
                              <input type="text" name="last_name" class="form-control" value="{{ teacher.last_name }}">
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Teacher ID</label>
                              <input type="text" class="form-control" value="{{ teacher.teacher_id }}" disabled>
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Email</label>
                              <input type="email" name="email" class="form-control" value="{{ teacher.email }}">
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Mobile Number</label>
                              <input type="text" name="mobile_number" class="form-control" value="{{ teacher.mobile_number }}">
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Subject</label>
                              <input type="text" name="subject" class="form-control" value="{{ teacher.subject }}">
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Qualification</label>
                              <input type="text" name="qualification" class="form-control" value="{{ teacher.qualification }}">
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Gender</label>
                              <select name="gender" class="form-control">
                                 <option value="Female" {% if teacher.gender == "Female" %}selected{% endif %}>Female</option>
                                 <option value="Male" {% if teacher.gender == "Male" %}selected{% endif %}>Male</option>
                                 <option value="Other" {% if teacher.gender == "Other" %}selected{% endif %}>Other</option>
                              </select>
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Date of Birth</label>
                              <input type="date" name="date_of_birth" class="form-control" value="{{ teacher.date_of_birth|date:'Y-m-d' }}">
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Joining Date</label>
                              <input type="date" name="joining_date" class="form-control" value="{{ teacher.joining_date|date:'Y-m-d' }}">
                           </div>
                        </div>

                        <div class="col-12">
                           <div class="form-group">
                              <label>Address</label>
                              <textarea name="address" class="form-control" rows="3">{{ teacher.address }}</textarea>
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Teacher Image</label>
                              <input type="file" name="teacher_image" class="form-control">
                           </div>
                        </div>

                        <div class="col-12">
                           <button type="submit" class="btn btn-primary">Update Teacher</button>
                           <a href="{% url 'teacher_list' %}" class="btn btn-secondary">Cancel</a>
                        </div>

                     </div>
                  </form>

               </div>
            </div>
         </div>
      </div>

   </div>
</div>
{% endblock %}
